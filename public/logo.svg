  <!-- Right eye patch -->
  <ellipse cx="31" cy="24" rx="5.5" ry="6" fill="white"/>

  <!-- Left eye -->
  <circle cx="17" cy="25" r="2.8" fill="#0a0a0a"/>
  <!-- Right eye -->
  <circle cx="31" cy="25" r="2.8" fill="#0a0a0a"/>

  <!-- Eye shine left -->
  <circle cx="18" cy="23.8" r="0.9" fill="white"/>
  <!-- Eye shine right -->
  <circle cx="32" cy="23.8" r="0.9" fill="white"/>

  <!-- Nose -->
